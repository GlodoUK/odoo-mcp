name: CI

on:
  push:
    branches: ['*']  # Run on all branches
    tags: ['v*']     # Also run on version tags
  pull_request:
    branches: ['*']  # Run on all PR branches

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"
    
    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Run pre-commit
      uses: pre-commit/action@v3.0.1

  test:
    name: Test Python
    runs-on: ubuntu-latest
    needs: lint  # Only run tests if linting passes
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
    
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"
    
    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"
    
    - name: Run unit tests with coverage
      run: |
        pytest -m "not integration" --cov=odoo_mcp --cov-report=xml --cov-report=term
      env:
        ODOO_URL: ${{ vars.ODOO_URL || 'http://localhost:8069' }}
        ODOO_DB: ${{ vars.ODOO_DB || 'test' }}

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6

    - name: Verify version matches tag
      run: |
        TAG="${GITHUB_REF_NAME#v}"
        PKG=$(grep '^version' pyproject.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
        if [ "$TAG" != "$PKG" ]; then
          echo "Tag $TAG does not match pyproject.toml version $PKG"
          exit 1
        fi

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
